name: aura
description: AURA — Ambient Social Presence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1

  # UI & Animation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.1

  # Audio
  just_audio: ^0.9.36

  # Utils
  intl: ^0.19.0
  file_selector: ^1.0.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  video_player: ^2.8.6
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.2
  http: ^1.1.0

  # QR code generation
  qr_flutter: ^4.1.0

  # External sharing
  share_plus: ^10.0.0

  # Spotify OAuth + crypto
  flutter_web_auth_2: ^4.0.0
  crypto: ^3.0.3

  # Apple Music (iOS only — gracefully no-ops on Android)
  music_kit: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
