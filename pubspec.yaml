name: aura
description: AURA — Ambient Social Presence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1

  # UI & Animation
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.1

  # Audio
  just_audio: ^0.9.36

  # Utils
  intl: ^0.19.0
  file_selector: ^1.0.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  video_player: ^2.8.6
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.2
  http: ^1.1.0

  # World map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # QR code generation
  qr_flutter: ^4.1.0

  # External sharing
  share_plus: ^10.0.0

  # Spotify OAuth + crypto
  flutter_web_auth_2: ^4.0.0
  crypto: ^3.0.3

  # Apple Music — music_kit removed (iOS 1.3.0 API lacks nowPlayingItem;
  # service is fully stubbed via conditional exports)

  # Push notifications
  firebase_messaging: ^14.7.10

  # Cloud Storage
  firebase_storage: ^11.7.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.13

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0c081c"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#0c081c"
  image: assets/icon/app_icon.png
  image_dark: assets/icon/app_icon.png
  color_dark: "#0c081c"
  android_12:
    color: "#0c081c"
    image: assets/icon/app_icon.png
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/
